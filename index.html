<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>點點恐龍蛋！</title>
  <meta name="theme-color" content="#bdefff" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">眼動儀點擊練習遊戲</p>
        <h1>點點恐龍蛋！</h1>
        <p class="subtitle">望住恐龍蛋／恐龍點擊，慢慢孵化同進化。爆擊機率已改成 5%。</p>
      </div>
      <button id="soundToggle" class="sound-btn" type="button" aria-pressed="true">🔊 聲音：開</button>
    </header>

    <section class="hud" aria-label="遊戲資料">
      <div class="card stat-card"><span class="label">成長值</span><strong id="scoreValue">0</strong></div>
      <div class="card stat-card"><span class="label">目前階段</span><strong id="stageName">恐龍蛋</strong></div>
      <div class="card stat-card crit-card"><span class="label">爆擊機率</span><strong>5%</strong></div>
    </section>

    <section class="game-shell">
      <div class="left-panel">
        <div class="card progress-card">
          <div class="progress-meta"><span>距離下一次進化</span><strong id="progressText">0 / 60</strong></div>
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div class="card stage-card">
          <p class="stage-title">現在狀態</p>
          <h2 id="stageHeading">恐龍蛋</h2>
          <p id="stageDescription">蛋殼好完整，但入面好似郁緊。</p>
        </div>
        <div class="card tips-card">
          <h3>玩法提示</h3>
          <p>目標做得好大，適合用眼動儀點擊。每次點擊都有不同可愛聲效；蛋會分 6 個裂開階段。</p>
        </div>
      </div>

      <div class="arena-wrap">
        <div class="arena" id="arena">
          <div class="cloud c1"></div><div class="cloud c2"></div>
          <div class="ground"></div>
          <div id="effectBurst" class="effect-burst"></div>
          <button id="dinoButton" class="dino-button" type="button" aria-label="點擊恐龍蛋或恐龍">
            <img id="dinoImage" src="assets/egg-0.svg" alt="恐龍蛋" draggable="false" />
          </button>
          <div id="floatingLayer" class="floating-layer"></div>
          <div id="evolveBanner" class="evolve-banner" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
